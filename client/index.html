    <!--
      Consent Mode v2 + GA4 / AdSense / Funding Choices CMP — LCP-gated bootstrap.

      What stays eager (inline below):
        - dataLayer + gtag() shim (so app-side gtag(...) calls buffer correctly)
        - Consent Mode v2 defaults (all denied + wait_for_update: 500)
        - gtag('js', ...) + gtag('config', ...) — both queue into dataLayer

      What is deferred until AFTER the first LCP candidate fires:
        - googletagmanager.com/gtag/js (GA4)
        - pagead2.googlesyndication.com/pagead/js/adsbygoogle.js (AdSense Auto Ads)
        - fundingchoicesmessages.google.com/i/pub-... (Funding Choices CMP)

      Why LCP-gated and not just `load`+idle: under simulated mobile/4G the
      idle callback can fire inside the FCP→LCP window on small SSG pages,
      letting CMP main-thread + network work (~150 ms script + Open Sans
      fetch + dialog reflow) push LCP past the 2.0 s gate. CAL-51 closed
      hero levers; CAL-52 closes the residual 0.119 s gap by waiting on a
      `largest-contentful-paint` PerformanceObserver entry before scheduling
      the loaders. Hard fallbacks: `load` event + 4 s timeout if no LCP
      entry ever arrives (hidden tab, no LCP element).

      gtag.js drains the buffered dataLayer when it loads, so no analytics
      events are lost. Consent dialog still appears within ~2 s of LCP.
    -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      window.gtag = gtag;
      gtag('js', new Date());
      gtag('consent', 'default', {
        'analytics_storage': 'denied',
        'ad_storage': 'denied',
        'ad_user_data': 'denied',
        'ad_personalization': 'denied',
        'wait_for_update': 500
      });
      gtag('config', 'G-P5BE4RN7QX');

      (function deferThirdParty() {
        var loaded = false;
        function injectScript(src, crossOrigin) {
          var s = document.createElement('script');
          s.async = true;
          s.src = src;
          if (crossOrigin) s.crossOrigin = 'anonymous';
          document.head.appendChild(s);
        }
        function loadDeferred() {
          if (loaded) return;
          loaded = true;
          injectScript('https://www.googletagmanager.com/gtag/js?id=G-P5BE4RN7QX', false);
          injectScript('https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1772283634325864', true);
          injectScript('https://fundingchoicesmessages.google.com/i/pub-1772283634325864?ers=1', true);
        }
        function scheduleIdle() {
          if ('requestIdleCallback' in window) {
            window.requestIdleCallback(loadDeferred, { timeout: 2000 });
          } else {
            setTimeout(loadDeferred, 500);
          }
        }
        var lcpFired = false;
        if ('PerformanceObserver' in window) {
          try {
            var po = new PerformanceObserver(function() {
              if (lcpFired) return;
              lcpFired = true;
              po.disconnect();
              scheduleIdle();
            });
            po.observe({ type: 'largest-contentful-paint', buffered: true });
          } catch (e) {
            // LCP entry type not supported — fall through to load-event fallback.
          }
        }
        // Hard fallback: fire 4 s after window.load if no LCP entry ever arrives
        // (e.g. background tab, no LCP element). Guarantees CMP eventually boots
        // so analytics/AdSense/consent UI are never silently dropped.
        window.addEventListener('load', function() {
          setTimeout(loadDeferred, 4000);
        }, { once: true });
      })();
    </script>
